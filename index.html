<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTA Auto-Spotter</title>
    
    <!-- Configurazione Icone per Android e Mobile -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="icon" type="image/png" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/8157/8157117.png">
    <link rel="apple-touch-icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/8157/8157117.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; padding: 20px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background-color: #3498db !important; color: white !important; }
        .badge-mode { font-weight: bold; padding: 5px 10px; border-radius: 5px; color: white; }
        .FT8 { background-color: #e74c3c; } .CW { background-color: #d35400; } .SSB { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- FORM DI INVIO -->
        <div class="col-md-3">
            <div class="card p-4">
                <h3 class="text-center mb-4">Invia Auto-Spot</h3>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Attivatore:</label>
                    <input type="text" id="activator" class="form-control" placeholder="es. K2L">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Frequenza (kHz):</label>
                    <input type="number" id="frequency" class="form-control" placeholder="14074">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Modo:</label>
                    <select id="mode" class="form-select">
                        <option value="FT8">FT8</option>
                        <option value="CW">CW</option>
                        <option value="SSB">SSB</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Referenza POTA:</label>
                    <input type="text" id="reference" class="form-control" placeholder="es. US-2912">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Spotter:</label>
                    <input type="text" id="spotter" class="form-control" value="IK6LMB" disabled>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Commenti:</label>
                    <input type="text" id="comments" class="form-control" placeholder="es. FT8 o CW">
                </div>
                
                <button id="btnInvia" class="btn btn-primary w-100" onclick="inviaSpot()">Invia Spot</button>
                <div id="statusResult" class="text-center mt-3 font-weight-bold"></div>
            </div>
        </div>

        <!-- TABELLA ATTIVITÀ -->
        <div class="col-md-9">
            <div class="table-container">
                <h3 class="text-center mb-4">Attività POTA Live</h3>
                <div class="row mb-3">
                    <div class="col">
                        <select id="filterBand" class="form-select" onchange="loadSpots()">
                            <option value="all">Tutte le bande</option>
                            <option value="20m">20 metri (14 MHz)</option>
                            <option value="40m">40 metri (7 MHz)</option>
                        </select>
                    </div>
                    <div class="col">
                        <select id="filterMode" class="form-select" onchange="loadSpots()">
                            <option value="all">Tutti i modi</option>
                            <option value="FT8">FT8</option>
                            <option value="CW">CW</option>
                            <option value="SSB">SSB</option>
                        </select>
                    </div>
                </div>
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Tempo</th>
                            <th>Attivatore</th>
                            <th>Frequenza</th>
                            <th>Modo</th>
                            <th>Referenza</th>
                        </tr>
                    </thead>
                    <tbody id="spotsTable">
                        <tr><td colspan="5" class="text-center">Caricamento in corso...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const POTA_TOKEN = "eyJraWQiOiI4Wm9SbnhvdER4QkNmVlFCQjNSU1dlWGZyWE9YMzFzY05FRFJheVVYa1NnPSIsImFsZyI6IlJTMjU2In0.eyJzdWIiOiIzM2RkNWEwZi0yYTA4LTQ1YjUtOWIxZC0yMWU3OGYwM2Q1ODIiLCJjb2duaXRvOmdyb3VwcyI6WyJVcGxvYWQiXSwiaXNzIjoiaHR0cHM6Ly9jb2duaXRvLWlkcC51cy1lYXN0LTIuYW1hem9uYXdzLmNvbS91cy1lYXN0LTJfbkE1alowa2xoIiwidmVyc2lvbiI6MiwiY2xpZW50X2lkIjoiN2hsdXFjdDBuMm5ja2liN2k3c2Q1NzUzb2EiLCJldmVudF9pZCI6ImY5MTA3YmIxLTBlOWQtNGMxNi1iNTg1LWMzMjNlZmVlZjU2NSIsInRva2VuX3VzZSI6ImFjY2VzcyIsInNjb3BlIjoiYXdzLmNvZ25pdG8uc2lnbmluLnVzZXIuYWRtaW4gcGhvbmUgb3BlbmlkIHByb2ZpbGUgZW1haWwiLCJhdXRoX3RpbWUiOjE3ODM0MjUzOTcsImV4cCI6MTczMzQyODk5NywiaWF0IjoxNzgzNDI1Mzk3LCJqdGkiOiJiOTNhMGM5ZC0zNDUwLTQ2YjUtYmEzYi01MjU2ZjljMWVkMmUiLCJ1c2VybmFtZSI6IjMzZGQ1YTBmLTJhMDgtNDViNS05YjFkLTIxZTc4ZjAzZDU4MiJ9.Hc1ZIbWyHhQmjp1N_Tar0oZ1b46FG8u1XGm7PNoGcjL03dRe95qrzxtnhPWM6Iasl_qpdbo67pmauogI20LHVxlhOvfZet6QSxNAf13su3Zkxk7_829QZBE2hmg5ngJDWUhDueOi1KfMzJhuIHlF0uA5ju14TEDzq7FDcPwTXcqgFXXkz1X84RnvMIW_0vtsi_qJtOkGe04rZJ8JrT5kRhYpbP0B5V02Bzvp2GXJI-4gcch4kclwLsBtAq4rtc7_7klTsM7Ukx96se9Dbo3EmwW42eaFQ__H1mT0xhIxX9jwDu4G4MUmXf582i6Zzs0mrBvt1DLRh2yQMW2WlBsO7A";

    function inviaSpot() {
        const btn = document.getElementById('btnInvia');
        const resDiv = document.getElementById('statusResult');
        
        const act = document.getElementById('activator').value.toUpperCase().trim();
        const freqVal = parseFloat(document.getElementById('frequency').value);
        const md = document.getElementById('mode').value;
        const ref = document.getElementById('reference').value.toUpperCase().trim();
        const comm = document.getElementById('comments').value || "";

        if(!act || !freqVal || !ref) {
            resDiv.innerHTML = "<span class='text-danger'>Compila i campi richiesti!</span>";
            return;
        }

        btn.disabled = true;
        resDiv.innerHTML = "<span class='text-warning'>Invio in corso...</span>";

        const freqMhz = freqVal > 1000 ? freqVal / 1000.0 : freqVal;

        const payload = {
            activator: act,
            spotter: "IK6LMB",
            frequency: freqMhz,
            mode: md,
            submode: "",
            reference: ref,
            comments: comm
        };

        fetch('/api/spot', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${POTA_TOKEN}`
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            btn.disabled = false;
            if (response.status === 200 || response.status === 201) {
                resDiv.innerHTML = "<span class='text-success'>✓ Spot Inviato con successo!</span>";
                setTimeout(() => { 
                    loadSpots(); 
                    resDiv.innerHTML = "";
                }, 2000);
            } else {
                resDiv.innerHTML = `<span class='text-danger'>X Rifiutato da POTA: Codice ${response.status}</span>`;
            }
        })
        .catch(error => {
            btn.disabled = false;
            resDiv.innerHTML = `<span class='text-danger'>Errore di rete: ${error}</span>`;
        });
    }

    function loadSpots() {
        const tableBody = document.getElementById('spotsTable');
        const filtBand = document.getElementById('filterBand').value;
        const filtMode = document.getElementById('filterMode').value;

        fetch('/api/spots')
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${data.error}</td></tr>`;
                    return;
                }
                
                tableBody.innerHTML = "";
                let count = 0;

                // Calcolo millisecondi attuali in formato UTC puro
                const now = new Date();
                const nowUtcMs = now.getTime() + (now.getTimezoneOffset() * 60000);

                data.forEach(spot => {
                    const freq = parseFloat(spot.frequency);
                    
                    if(filtBand === "20m" && (freq < 14.0 || freq > 14.35)) return;
                    if(filtBand === "40m" && (freq < 7.0 || freq > 7.3)) return;
                    if(filtMode !== "all" && spot.mode !== filtMode) return;

                    count++;
                    if(count > 40) return;

                    // Calcolo del tempo trascorso relativo senza discrepanze di fuso orario
                    let timeStr = "Attivo";
                    if(spot.spotTime) {
                        const spotDate = new Date(spot.spotTime);
                        const diffMs = nowUtcMs - spotDate.getTime();
                        const diffMins = Math.floor(diffMs / 60000);
                        const diffSecs = Math.floor(diffMs / 1000);

                        if (diffMins < 1) {
                            timeStr = diffSecs <= 10 ? "Ora" : `${diffSecs}s fa`;
                        } else if (diffMins >= 60) {
                            const diffHours = Math.floor(diffMins / 60);
                            const remMins = diffMins % 60;
                            timeStr = remMins > 0 ? `${diffHours}h ${remMins}m fa` : `${diffHours}h fa`;
                        } else {
                            timeStr = `${diffMins}m fa`;
                        }
                    }

                    // Frequenza pulita (es. 14.074 MHz)
                    const freqMhz = freq.toFixed(3);

                    const row = `<tr>
                        <td>${timeStr}</td>
                        <td><strong>${spot.activator}</strong></td>
                        <td>${freqMhz} MHz</td>
                        <td><span class="badge-mode ${spot.mode}">${spot.mode}</span></td>
                        <td>${spot.reference}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                if(count === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Nessun attivatore corrisponde ai filtri</td></tr>`;
                }
            })
            .catch(err => {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Errore caricamento dati</td></tr>`;
            });
    }

    loadSpots();
    setInterval(loadSpots, 30000);
</script>
</body>
</html>
