<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POTA Auto-Spotter</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; padding: 15px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; margin-bottom: 15px; padding: 15px !important; }
        .table-container { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background-color: #3498db !important; color: white !important; font-size: 14px; padding: 8px 4px !important; }
        td { font-size: 13px; padding: 8px 4px !important; vertical-align: middle; }
        .badge-mode { font-weight: bold; padding: 3px 6px; border-radius: 4px; color: white; font-size: 11px; text-transform: uppercase; }
        
        /* Colori dinamici per i Modi */
        .FT8 { background-color: #e74c3c; } 
        .FT4 { background-color: #9b59b6; }
        .CW { background-color: #d35400; } 
        .SSB, .PHONE { background-color: #2980b9; }
        .DATA, .DIGITAL { background-color: #7f8c8d; }
        
        h3 { font-size: 1.3rem; margin-bottom: 15px !important; }
        .mb-3 { margin-bottom: 0.7rem !important; }
        .form-label { margin-bottom: 0.2rem; font-size: 13px; font-weight: bold; }
        .form-control, .form-select { padding: 0.4rem 0.6rem; font-size: 13px; }

        /* OTTIMIZZAZIONE COMPATTA PER SCHERMI CELLULARE */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .card, .table-container { padding: 8px !important; margin-bottom: 8px; }
            th { font-size: 10.5px; padding: 6px 3px !important; }
            td { font-size: 10.5px; padding: 6px 3px !important; }
            .badge-mode { font-size: 9.5px; padding: 2px 3px; }
            h3 { font-size: 1.05rem; margin-bottom: 10px !important; }
            .form-control, .form-select { padding: 0.35rem 0.5rem; font-size: 12px; }
            .form-label { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container-fluid px-1">
    <div class="row g-2">
        <div class="col-md-3">
            <div class="card">
                <h3 class="text-center">Invia Auto-Spot</h3>
                
                <div class="mb-3">
                    <label class="form-label">Attivatore:</label>
                    <input type="text" id="activator" class="form-control" placeholder="es. K2L">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Frequenza (kHz):</label>
                    <input type="number" id="frequency" class="form-control" placeholder="14074">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Modo:</label>
                    <select id="mode" class="form-select">
                        <option value="FT8">FT8</option>
                        <option value="FT4">FT4</option>
                        <option value="CW">CW</option>
                        <option value="SSB">SSB</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Referenza POTA:</label>
                    <input type="text" id="reference" class="form-control" placeholder="es. US-2912">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Spotter:</label>
                    <input type="text" id="spotter" class="form-control" value="IK6LMB" disabled>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Commenti:</label>
                    <input type="text" id="comments" class="form-control" placeholder="es. FT8 o CW">
                </div>
                
                <button id="btnInvia" class="btn btn-primary w-100" onclick="inviaSpot()">Invia Spot</button>
                <div id="statusResult" class="text-center mt-2 font-weight-bold" style="font-size: 12px;"></div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="table-container">
                <h3 class="text-center">Attività POTA Live</h3>
                <div class="row g-2 mb-3">
                    <div class="col">
                        <select id="filterBand" class="form-select form-select-sm" onchange="loadSpots()">
                            <option value="all">Tutte le bande</option>
                            <option value="6m">6 metri (50 MHz)</option>
                            <option value="10m">10 metri (28 MHz)</option>
                            <option value="12m">12 metri (24 MHz)</option>
                            <option value="15m">15 metri (21 MHz)</option>
                            <option value="17m">17 metri (18 MHz)</option>
                            <option value="20m">20 metri (14 MHz)</option>
                            <option value="30m">30 metri (10 MHz)</option>
                            <option value="40m">40 metri (7 MHz)</option>
                            <option value="60m">60 metri (5.3 MHz)</option>
                            <option value="80m">80 metri (3.5 MHz)</option>
                            <option value="160m">160 metri (1.8 MHz)</option>
                            <option value="2m">2 metri (144 MHz)</option>
                        </select>
                    </div>
                    <div class="col">
                        <select id="filterMode" class="form-select form-select-sm" onchange="loadSpots()">
                            <option value="all">Tutti i modi</option>
                            <option value="FT8">FT8</option>
                            <option value="FT4">FT4</option>
                            <option value="CW">CW</option>
                            <option value="SSB">SSB / PHONE</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Tempo</th>
                                <th>Attivatore</th>
                                <th>Frequenza</th>
                                <th>Modo</th>
                                <th>Referenza</th>
                            </tr>
                        </thead>
                        <tbody id="spotsTable">
                            <tr><td colspan="5" class="text-center text-muted">Caricamento in corso...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const POTA_TOKEN = "eyJraWQiOiI4Wm9SbnhvdER4QkNmVlFCQjNSU1dlWGZyWE9YMzFzY05FRFJheVVYa1NnPSIsImFsZyI6IlJTMjU2In0.eyJzdWIiOiIzM2RkNWEwZi0yYTA4LTQ1YjUtOWIxZC0yMWU3OGYwM2Q1ODIiLCJjb2duaXRvOmdyb3VwcyI6WyJVcGxvYWQiXSwiaXNzIjoiaHR0cHM6Ly9jb2duaXRvLWlkcC51cy1lYXN0LTIuYW1hem9uYXdzLmNvbS91cy1lYXN0LTJfbkE1alowa2xoIiwidmVyc2lvbiI6MiwiY2xpZW50X2lkIjoiN7hsdXFjdDBuMm5ja2liN2k3c2Q1NzUzb2EiLCJldmVudF9pZCI6ImY5MTA3YmIxLTBlOWQtNGMxNi1iNTg1LWMzMjNlZmVlZjU2NSIsInRva2VuX3VzZSI6ImFjY2VzcyIsInNjb3BlIjoiYXdzLmNvZ25pdG8uc2lnbmluLnVzZXIuYWRtaW4gcGhvbmUgb3BlbmlkIHByb2ZpbGUgZW1haWwiLCJhdXRoX3RpbWUiOjE3ODM0MjUzOTcsImV4cCI6MTczMzQyODk5NywiaWF0IjoxNzgzNDI1Mzk3LCJqdGkiOiJiOTNhMGM5ZC0zNDUwLTQ2YjUtYmEzYi01MjU2ZjljMWVkMmUiLCJ1c2VybmFtZSI6IjMzZGQ1YTBmLTJhMDgtNDViNS05YjFkLTIxZTc4ZjAzZDU4MiJ9.Hc1ZIbWyHhQmjp1N_Tar0oZ1b46FG8u1XGm7PNoGcjL03dRe95qrzxtnhPWM6Iasl_qpdbo67pmauogI20LHVxlhOvfZet6QSxNAf13su3Zkxk7_829QZBE2hmg5ngJDWUhDueOi1KfMzJhuIHlF0uA5ju14TEDzq7FDcPwTXcqgFXXkz1X84RnvMIW_0vtsi_qJtOkGe04rZJ8JrT5kRhYpbP0B5V02Bzvp2GXJI-4gcch4kclwLsBtAq4rtc7_7klTsM7Ukx96se9Dbo3EmwW42eaFQ__H1mT0xhIxX9jwDu4G4MUmXf582i6Zzs0mrBvt1DLRh2yQMW2WlBsO7A";

    function inviaSpot() {
        const btn = document.getElementById('btnInvia');
        const resDiv = document.getElementById('statusResult');
        
        const act = document.getElementById('activator').value.toUpperCase().trim();
        const freqVal = parseFloat(document.getElementById('frequency').value);
        const md = document.getElementById('mode').value;
        const ref = document.getElementById('reference').value.toUpperCase().trim();
        const comm = document.getElementById('comments').value || "";

        if(!act || !freqVal || !ref) {
            resDiv.innerHTML = "<span class='text-danger'>Compila i campi richiesti!</span>";
            return;
        }

        btn.disabled = true;
        resDiv.innerHTML = "<span class='text-warning'>Invio in corso...</span>";

        const freqMhz = freqVal > 1000 ? freqVal / 1000.0 : freqVal;

        const payload = {
            activator: act,
            spotter: "IK6LMB",
            frequency: freqMhz,
            mode: md,
            submode: "",
            reference: ref,
            comments: comm
        };

        fetch('/api/spot', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${POTA_TOKEN}`
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            btn.disabled = false;
            if (response.status === 200 || response.status === 201) {
                resDiv.innerHTML = "<span class='text-success'>✓ Spot Inviato!</span>";
                setTimeout(() => { 
                    loadSpots(); 
                    resDiv.innerHTML = "";
                }, 2000);
            } else {
                resDiv.innerHTML = `<span class='text-danger'>X Rifiutato: ${response.status}</span>`;
            }
        })
        .catch(error => {
            btn.disabled = false;
            resDiv.innerHTML = `<span class='text-danger'>Errore rete: ${error}</span>`;
        });
    }

    function loadSpots() {
        const tableBody = document.getElementById('spotsTable');
        const filtBand = document.getElementById('filterBand').value;
        const filtMode = document.getElementById('filterMode').value;

        fetch('/api/spots')
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${data.error}</td></tr>`;
                    return;
                }
                
                tableBody.innerHTML = "";
                let count = 0;
                const now = new Date();
                const nowUtcMs = now.getTime() + (now.getTimezoneOffset() * 60000);

                data.forEach(spot => {
                    // parsing sicuro della frequenza numerica grezza inviata dal server
                    let rawFreq = parseFloat(spot.frequency);
                    if(isNaN(rawFreq)) return;

                    // Se la frequenza arriva espressa in kHz (es. 14074000 o 14074), normalizziamola in MHz (es. 14.074)
                    if (rawFreq > 100000) {
                        rawFreq = rawFreq / 1000000.0;
                    } else if (rawFreq > 1000) {
                        rawFreq = rawFreq / 1000.0;
                    }

                    // 1. ASSEGNAZIONE MODI ROBUSTA (FT8, FT4, CW, SSB)
                    let modoRilevato = (spot.mode || "").toUpperCase().trim();
                    let sottoModo = (spot.submode || "").toUpperCase().trim();
                    let commenti = (spot.comments || "").toUpperCase();
                    
                    if (sottoModo === "FT4" || commenti.includes("FT4")) {
                        modoRilevato = "FT4";
                    } else if (sottoModo === "FT8" || commenti.includes("FT8")) {
                        modoRilevato = "FT8";
                    } else if (modoRilevato === "PHONE" || modoRilevato === "SSB" || commenti.includes("SSB") || commenti.includes("LSB") || commenti.includes("USB")) {
                        modoRilevato = "SSB";
                    } else if (modoRilevato === "CW" || commenti.includes("CW")) {
                        modoRilevato = "CW";
                    }

                    if(!modoRilevato || modoRilevato === "DATA" || modoRilevato === "DIGITAL") {
                        modoRilevato = "DATA";
                    }

                    // 2. FILTRAGGIO BANDE MATEMATICO (Infallibile: non dipende più dalle stringhe di POTA)
                    if(filtBand !== "all") {
                        if(filtBand === "6m" && (rawFreq < 50.0 || rawFreq > 54.0)) return;
                        if(filtBand === "10m" && (rawFreq < 28.0 || rawFreq > 29.7)) return;
                        if(filtBand === "12m" && (rawFreq < 24.89 || rawFreq > 24.99)) return;
                        if(filtBand === "15m" && (rawFreq < 21.0 || rawFreq > 21.45)) return;
                        if(filtBand === "17m" && (rawFreq < 18.068 || rawFreq > 18.168)) return;
                        if(filtBand === "20m" && (rawFreq < 14.0 || rawFreq > 14.35)) return; // Seleziona da 14.000 a 14.350 MHz
                        if(filtBand === "30m" && (rawFreq < 10.1 || rawFreq > 10.15)) return;
                        if(filtBand === "40m" && (rawFreq < 7.0 || rawFreq > 7.3)) return;   // Seleziona da 7.000 a 7.300 MHz
                        if(filtBand === "60m" && (rawFreq < 5.06 || rawFreq > 5.45)) return;
                        if(filtBand === "80m" && (rawFreq < 3.5 || rawFreq > 3.8)) return;
                        if(filtBand === "160m" && (rawFreq < 1.8 || rawFreq > 2.0)) return;
                        if(filtBand === "2m" && (rawFreq < 144.0 || rawFreq > 148.0)) return;
                    }
                    
                    // Filtraggio per Modalità
                    if(filtMode !== "all") {
                        if(filtMode === "SSB" && modoRilevato !== "SSB") return;
                        if(filtMode !== "SSB" && modoRilevato !== filtMode) return;
                    }

                    count++;
                    if(count > 35) return;

                    // Calcolo Orario Relativo
                    let timeStr = "Attivo";
                    if(spot.spotTime) {
                        const spotDate = new Date(spot.spotTime);
                        const diffMs = nowUtcMs - spotDate.getTime();
                        const diffMins = Math.floor(diffMs / 60000);
                        const diffSecs = Math.floor(diffMs / 1000);

                        if (diffMins < 1) {
                            timeStr = diffSecs <= 10 ? "Ora" : `${diffSecs}s fa`;
                        } else if (diffMins >= 60) {
                            const diffHours = Math.floor(diffMins / 60);
                            const remMins = diffMins % 60;
                            timeStr = remMins > 0 ? `${diffHours}h ${remMins}m` : `${diffHours}h`;
                        } else {
                            timeStr = `${diffMins}m fa`;
                        }
                    }

                    const freqMhz = rawFreq.toFixed(3);

                    let badgeClass = modoRilevato;
                    if(badgeClass !== "FT8" && badgeClass !== "FT4" && badgeClass !== "CW" && badgeClass !== "SSB") {
                        badgeClass = "DATA"; 
                    }

                    const row = `<tr>
                        <td>${timeStr}</td>
                        <td><strong>${spot.activator}</strong></td>
                        <td>${freqMhz} MHz</td>
                        <td><span class="badge-mode ${badgeClass}">${modoRilevato}</span></td>
                        <td>${spot.reference}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                if(count === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Nessun attivatore trovato per i filtri selezionati</td></tr>`;
                }
            })
            .catch(err => {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Errore caricamento dati</td></tr>`;
            });
    }

    loadSpots();
    setInterval(loadSpots, 30000);
</script>
</body>
</html>
