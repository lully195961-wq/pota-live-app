<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>POTA Tool</title>
    <style>
        body { font-family: sans-serif; display: flex; padding: 20px; gap: 20px; }
        #input-side { width: 40%; }
        #output-side { width: 60%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="input-side">
    <h2>Invia Auto-Spot</h2>
    <input type="text" id="activator" placeholder="Attivatore">
    <input type="number" id="frequency" placeholder="Frequenza kHz">
    <input type="text" id="reference" placeholder="Referenza">
    <textarea id="comments" placeholder="Commenti"></textarea>
    <button onclick="sendSpot()">Invia Spot</button>
    <div id="message"></div>
</div>

<div id="output-side">
    <h2>Attività POTA Live</h2>
    <table id="spotsTable">
        <thead><tr><th>Attivatore</th><th>Frequenza</th><th>Referenza</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // CARICAMENTO TABELLA
    async function loadSpots() {
        try {
            const response = await fetch('/api/spots');
            const spots = await response.json();
            const tbody = document.querySelector('#spotsTable tbody');
            tbody.innerHTML = ''; 
            spots.forEach(spot => {
                tbody.innerHTML += `<tr><td>${spot.activator}</td><td>${spot.frequency}</td><td>${spot.reference}</td></tr>`;
            });
        } catch(e) { console.error("Errore nel caricamento:", e); }
    }
    
    // Auto-refresh ogni 30 secondi
    loadSpots();
    setInterval(loadSpots, 30000);

    async function sendSpot() {
        // ... (la tua funzione di invio che abbiamo scritto prima)
    }
</script>
</body>
</html>
