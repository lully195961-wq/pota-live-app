<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POTA Auto-Spotter</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; padding: 15px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; margin-bottom: 15px; padding: 15px !important; }
        .table-container { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background-color: #3498db !important; color: white !important; font-size: 14px; padding: 8px 4px !important; }
        td { font-size: 13px; padding: 8px 4px !important; vertical-align: middle; }
        .badge-mode { font-weight: bold; padding: 3px 6px; border-radius: 4px; color: white; font-size: 11px; text-transform: uppercase; }
        
        /* Colori dinamici per i Modi */
        .FT8 { background-color: #e74c3c; } 
        .FT4 { background-color: #9b59b6; }
        .CW { background-color: #d35400; } 
        .SSB, .PHONE { background-color: #2980b9; }
        .DATA, .DIGITAL { background-color: #7f8c8d; }
        
        h3 { font-size: 1.3rem; margin-bottom: 15px !important; }
        .mb-3 { margin-bottom: 0.7rem !important; }
        .form-label { margin-bottom: 0.2rem; font-size: 13px; font-weight: bold; }
        .form-control, .form-select { padding: 0.4rem 0.6rem; font-size: 13px; }

        /* OTTIMIZZAZIONE COMPATTA PER SCHERMI CELLULARE */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .card, .table-container { padding: 8px !important; margin-bottom: 8px; }
            th { font-size: 10.5px; padding: 6px 3px !important; }
            td { font-size: 10.5px; padding: 6px 3px !important; }
            .badge-mode { font-size: 9.5px; padding: 2px 3px; }
            h3 { font-size: 1.05rem; margin-bottom: 10px !important; }
            .form-control, .form-select { padding: 0.35rem 0.5rem; font-size: 12px; }
            .form-label { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container-fluid px-1">
    <div class="row g-2">
        <div class="col-md-3">
            <div class="card">
                <h3 class="text-center">Invia Auto-Spot</h3>
                
                <div class="mb-3">
                    <label class="form-label">Attivatore:</label>
                    <input type="text" id="activator" class="form-control" placeholder="es. K2L">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Frequenza (kHz):</label>
                    <input type="number" id="frequency" class="form-control" placeholder="14074">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Modo:</label>
                    <select id="mode" class="form-select">
                        <option value="FT8">FT8</option>
                        <option value="FT4">FT4</option>
                        <option value="CW">CW</option>
                        <option value="SSB">SSB</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Referenza POTA:</label>
                    <input type="text" id="reference" class="form-control" placeholder="es. US-2912">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Spotter:</label>
                    <input type="text" id="spotter" class="form-control" value="IK6LMB" disabled>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Commenti:</label>
                    <input type="text" id="comments" class="form-control" placeholder="es. FT8 o CW">
                </div>
                
                <button id="btnInvia" class="btn btn-primary w-100" onclick="inviaSpot()">Invia Spot</button>
                <div id="statusResult" class="text-center mt-2 font-weight-bold" style="font-size: 12px;"></div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="table-container">
                <h3 class="text-center">Attività POTA Live</h3>
                <div class="row g-2 mb-3">
                    <div class="col">
                        <select id="filterBand" class="form-select form-select-sm" onchange="loadSpots()">
                            <option value="all">Tutte le bande</option>
                            <option value="6m">6 metri (50 MHz)</option>
                            <option value="10m">10 metri (28 MHz)</option>
                            <option value="12m">12 metri (24 MHz)</option>
                            <option value="15m">15 metri (21 MHz)</option>
                            <option value="17m">17 metri (18 MHz)</option>
                            <option value="20m">20 metri (14 MHz)</option>
                            <option value="30m">30 metri (10 MHz)</option>
                            <option value="40m">40 metri (7 MHz)</option>
                            <option value="60m">60 metri (5.3 MHz)</option>
                            <option value="80m">80 metri (3.5 MHz)</option>
                            <option value="160m">160 metri (1.8 MHz)</option>
                            <option value="2m">2 metri (144 MHz)</option>
                        </select>
                    </div>
                    <div class="col">
                        <select id="filterMode" class="form-select form-select-sm" onchange="loadSpots()">
                            <option value="all">Tutti i modi</option>
                            <option value="FT8">FT8</option>
                            <option value="FT4">FT4</option>
                            <option value="CW">CW</option>
                            <option value="SSB">SSB / PHONE</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Tempo</th>
                                <th>Attivatore</th>
                                <th>Frequenza</th>
                                <th>Modo</th>
                                <th>Referenza</th>
                            </tr>
                        </thead>
                        <tbody id="spotsTable">
                            <tr><td colspan="5" class="text-center text-muted">Caricamento in corso...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function inviaSpot() {
        const btn = document.getElementById('btnInvia');
        const resDiv = document.getElementById('statusResult');
        
        const act = document.getElementById('activator').value.toUpperCase().trim();
        const freqVal = parseFloat(document.getElementById('frequency').value);
        const md = document.getElementById('mode').value;
        const ref = document.getElementById('reference').value.toUpperCase().trim();
        const comm = document.getElementById('comments').value || "";

        if(!act || !freqVal || !ref) {
            resDiv.innerHTML = "<span class='text-danger'>Compila i campi richiesti!</span>";
            return;
        }

        btn.disabled = true;
        resDiv.innerHTML = "<span class='text-warning'>Invio in corso...</span>";

        const freqMhz = freqVal > 1000 ? freqVal / 1000.0 : freqVal;

        const payload = {
            activator: act,
            spotter: "IK6LMB",
            frequency: freqMhz,
            mode: md,
            submode: "",
            reference: ref,
            comments: comm
        };

        fetch('/api/spot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            btn.disabled = false;
            if (response.status === 200 || response.status === 201) {
                resDiv.innerHTML = "<span class='text-success'>✓ Spot Inviato!</span>";
                setTimeout(() => { 
                    loadSpots(); 
                    resDiv.innerHTML = "";
                }, 2000);
            } else {
                resDiv.innerHTML = `<span class='text-danger'>X Rifiutato: ${response.status}</span>`;
            }
        })
        .catch(error => {
            btn.disabled = false;
            resDiv.innerHTML = `<span class='text-danger'>Errore rete: ${error}</span>`;
        });
    }

    function getBandaString(freq) {
        if(freq >= 50.0 && freq <= 54.0) return "6m";
        if(freq >= 28.0 && freq <= 29.7) return "10m";
        if(freq >= 24.89 && freq <= 24.99) return "12m";
        if(freq >= 21.0 && freq <= 21.45) return "15m";
        if(freq >= 18.068 && freq <= 18.168) return "17m";
        if(freq >= 14.0 && freq <= 14.35) return "20m";
        if(freq >= 10.1 && freq <= 10.15) return "30m";
        if(freq >= 7.0 && freq <= 7.3) return "40m";
        if(freq >= 5.06 && freq <= 5.45) return "60m";
        if(freq >= 3.5 && freq <= 3.8) return "80m";
        if(freq >= 1.8 && freq <= 2.0) return "160m";
        if(freq >= 144.0 && freq <= 148.0) return "2m";
        return "unknown";
    }

    function loadSpots() {
        const tableBody = document.getElementById('spotsTable');
        const filtBand = document.getElementById('filterBand').value;
        const filtMode = document.getElementById('filterMode').value;

        fetch('/api/spots')
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${data.error}</td></tr>`;
                    return;
                }
                
                tableBody.innerHTML = "";
                let count = 0;
                const now = new Date();
                const nowUtcMs = now.getTime() + (now.getTimezoneOffset() * 60000);

                const visti = new Set();
